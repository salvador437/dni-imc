<!DOCTYPE html>
<html lang="es">

  <head>

    <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Error 404</title>
      <link rel="stylesheet" href="./hojas-estilo/error404.css">
      <link rel="shortcut icon" sizes="64x64" type="image/svg" href="./images/logo-template.svg" />
    </head>
  </head>
  
  <body>
    <div class="error-container">
      <h1 class="error-message">error 404</h1>
      <p class="texto-error">página no encontrada</p>
      <a id="salir" href="./index.html">HOME</a>
    </div>
    
    <script type="module" src="./src/funciones.js"></script> 
    <script type="module" defer src="./src/error404.js"></script>
    <script>
      document.addEventListener("keydown", (event) => {
        if (event.ctrlKey && event.key === "z" || event.ctrlKey && event.key === "Z") {
          window.open("./index.html","_self","",true);
        }
      });
    </script>
  </body>

</html>
