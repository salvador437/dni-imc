<!DOCTYPE html>
<html lang="es">

  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cálculo DNI</title>
    <link rel="shortcut icon" sizes="64x64" type="image/svg" href="./images/logo-template.svg"/>
    <link rel="stylesheet" href="/hojas-estilo/index.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:ital,wght@0,100..700;1,100..700&display=swap"
      rel="stylesheet">
  </head>

  <script type="text/javascript" defer>
    window.history.forward(1);
  </script>

  <body>
    <header>
      <!-- ----- menu de navegación -----  -->
      <div class="navbar">
        <div class="logo">CÁLCULO LETRA DNI </div>
        <img src="images/logo3.svg" alt="logo3">
        <div class="menu" id="navbarMenu">
          <a href="./calculoIMC.html" title="cálculo IMC">Cálculo IMC</a>
          <a href="https://developer.mozilla.org/es/docs/Web/css" target="_blank" title="MDN-css">MDN-css</a>
          <a href="https://developer.mozilla.org/es/docs/Web/JavaScript" target="_blank"
            title="MDN-javascript">MDN-js</a>
          <a href="./link.html" target="_blank" title="Link">
            Link</a>
          <a href="./template.html" title="validacionCard">Luhn-Algorithm</a>
          <a href="images/salva.jpg" target="_blank" title="foto"> Contacto </a>
        </div>
        <div class="menu-icon" onclick="toggleMenu()">&#9776;</div>
      </div>
    </header>

    <main>
      <!-- -------- card DNI -------- -->
      <div class="container-flex">

        <div class="clase-dni">
          <center><p>Cálculo letra del DNI:</p>
          <input type="text" class="input-dniNumero" placeholder="   introduzca nº DNI" maxlength="8">
          <button class="btn-calcular" accesskey="l">calcular</button></center>
          <div class="clase-dni-resultado">
            <p id="resultado"></p>
          </div>
        </div>
        <!--  card conversor temperatura C/F -->
        <div class="conversor">
          <center><p>Conversor de temperatura C/F:</p>
          <input type="text" class="input-conversor" placeholder=" introduzca grados C" maxlength="5">
          <button class="btn-cal-temp">calcular</button></center>
          <div class="clase-conversor-resultado">
            <p id="resultado-temperatura"></p>
          </div>
        </div>
      </div>
    </main>
    <!-- pie de página (footer) -->
    <footer>
      <div class="footer">
        <img src="images/logo2.svg" alt="logo2"> &copy; Telacojo sabadell (BCN)
      </div>
    </footer>
    <script defer src="./src/index.js"></script>
  </body>
</html>
