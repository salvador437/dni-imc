<!DOCTYPE html>
<html lang="es">

	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>Validación de Formulario con Javascript</title>
		<link rel="stylesheet" href="https://necolas.github.io/normalize.css/8.0.1/normalize.css">
		<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
		<link rel="stylesheet" href="hojas-estilo/estilos.css">
	</head>

	<body>
		<div class="formulario">
			<form action="/" method="post">
				<span class="close4">&times;</span>
				<div class="grupo-entradas">
					<label for="nombre" class="grupo-entradas">Nombre:</label>
					<input type="text" id="nombre" name="user_name" />
				</div>
				<div class="grupo-entradas">
					<label for="mail" class="grupo-entradas" >Correo electrónico:</label>
					<input type="email" id="mail" name="user_mail" />
				</div>
				<div class="grupo-entradas">
					<textarea class="grupo-entradas"  id="msg" name="user_message" placeholder="Escriba aqui su nota"></textarea>
				</div>
				<div class="grupo-entradas">
					<img src="./images/logo.svg" alt="">
					<button type="submit" >Enviar</button>
				</div>	
			</form>
		</div>
		<script src="./src/formulario.js"></script>
		</body>
</html>
